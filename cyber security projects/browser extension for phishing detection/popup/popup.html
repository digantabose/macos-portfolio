<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishShield Dashboard</title>
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body class="bg-dark text-white font-sans overflow-hidden select-none m-0">
  <!-- Top Header -->
  <header class="flex items-center justify-between border-b border-gray-800/40 pb-2 mb-3">
    <div class="flex items-center space-x-2">
      <div class="header-icon-glow">
        <svg class="w-4 h-4 text-emerald-400" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M2.166 4.9L10 1.154l7.834 3.746a1 1 0 01.613.92v5.334c0 4.076-2.614 7.695-6.537 9.176l-.656.248a1.002 1.002 0 01-.708 0l-.656-.248C3.78 15.8 1.166 12.181 1.166 8.104V5.82a1 1 0 01.613-.92zM10 3.167L3.833 6.12v1.984c0 3.208 1.942 6.077 4.966 7.291l1.2.483 1.201-.483c3.024-1.214 4.966-4.083 4.966-7.291V6.12L10 3.167z" clip-rule="evenodd"/>
        </svg>
      </div>
      <span class="font-extrabold text-xs tracking-wider uppercase bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-teal-300">PhishShield</span>
    </div>
    <span class="text-[9px] text-gray-500 font-mono">v1.0.0</span>
  </header>

  <!-- Hero Card: Score & Status Side-by-Side -->
  <div class="hero-card flex items-center p-3 mb-3 bg-gray-900/30 border border-gray-800/60 rounded-2xl gap-4">
    <!-- Circle Score Left -->
    <div class="relative w-20 h-20 shrink-0 flex items-center justify-center">
      <svg class="w-full h-full rotate-90-neg" viewBox="0 0 100 100">
        <circle id="progress-bg-circle" stroke-width="6" fill="transparent" r="38" cx="50" cy="50"/>
        <circle id="progress-circle" stroke-width="6" stroke-linecap="round" stroke="currentColor" fill="transparent" r="38" cx="50" cy="50" stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
      </svg>
      <div class="absolute flex flex-col items-center justify-center text-center">
        <span class="text-xl font-black tracking-tight" id="score-text">--</span>
        <span class="text-[7.5px] uppercase tracking-wider text-gray-500 font-bold -mt-0.5">Trust</span>
      </div>
    </div>

    <!-- Status Details Right -->
    <div class="flex flex-col justify-center min-w-0 flex-1">
      <div class="status-pill" id="status-pill">
        Analyzing...
      </div>
      <p class="text-[10px] text-gray-400 leading-normal m-0" id="status-message">
        Scanning page structure and reputation records...
      </p>
    </div>
  </div>

  <!-- Site Intelligence Panel -->
  <div class="bg-gray-900/30 border border-gray-800/60 rounded-2xl p-3 mb-3 space-y-2">
    <h3 class="text-[9px] uppercase tracking-widest text-gray-500 font-bold m-0 mb-1">Site Intelligence</h3>
    
    <div class="flex justify-between items-center text-xxs intel-row py-0.5">
      <span class="text-gray-400">Hosting Location</span>
      <span class="font-medium text-gray-200 value-text" id="intel-location">Loading...</span>
    </div>
    <div class="flex justify-between items-center text-xxs intel-row py-0.5">
      <span class="text-gray-400">Network (ASN)</span>
      <span class="font-medium text-gray-200 value-text" id="intel-asn" title="ASN">Loading...</span>
    </div>
    <div class="flex justify-between items-center text-xxs intel-row py-0.5">
      <span class="text-gray-400">Registration Age</span>
      <span class="font-medium text-gray-200" id="intel-age">Loading...</span>
    </div>
    <div class="flex justify-between items-center text-xxs intel-row py-0.5">
      <span class="text-gray-400">Connection SSL</span>
      <span class="font-medium text-gray-200" id="intel-ssl">Loading...</span>
    </div>
  </div>

  <!-- Footer Actions -->
  <footer class="flex justify-center">
    <button class="py-1 px-4 bg-red-950/10 hover:bg-red-950/30 border border-red-900/30 hover:border-red-600/50 text-red-300 hover:text-white rounded-full text-[10px] font-bold tracking-wide transition-all duration-200 ease-in-out cursor-pointer flex items-center justify-center space-x-1" id="btn-report">
      <svg class="w-3.5 h-3.5 fill-none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <span>Report Suspicious Site</span>
    </button>
  </footer>
</body>
</html>
